<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Cata PRO - Resultados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body class="bg-zinc-950 text-slate-200 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 italic uppercase tracking-tighter">
                Ranking Cata PRO
            </h1>
            <div class="mt-4 inline-flex items-center gap-2 px-3 py-1 bg-zinc-800 rounded-full border border-zinc-700">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <p class="text-xs font-mono text-zinc-400 uppercase tracking-widest">En tiempo real</p>
            </div>
        </header>

        <div id="ranking-container" class="space-y-4">
            <!-- Cargando -->
            <div class="text-center py-20 text-zinc-600 animate-pulse">
                Sincronizando con Google Sheets...
            </div>
        </div>
    </div>

    <script>
        // Configuración basada en tu hoja
        const SHEET_ID = '1b8rv0cUEfBeJkLPMSG4ew1CnCAA2DKCA53pp0syQJl4';
        
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(fetchRanking);

        function fetchRanking() {
            // Seleccionamos Variedad (C) y Nota (E), agrupando por Variedad y calculando la media
            const query = encodeURIComponent("SELECT C, AVG(E) WHERE C IS NOT NULL GROUP BY C ORDER BY AVG(E) DESC");
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;

            fetch(url)
                .then(res => res.text())
                .then(rep => {
                    const data = JSON.parse(rep.substr(47).slice(0, -2));
                    renderUI(data.table.rows);
                })
                .catch(err => console.error("Error:", err));
        }

        function renderUI(rows) {
            const container = document.getElementById('ranking-container');
            container.innerHTML = '';

            rows.forEach((row, index) => {
                const name = row.c[0].v;
                const score = row.c[1].v.toFixed(2);
                const pos = index + 1;

                const card = document.createElement('div');
                card.className = `flex items-center justify-between p-5 rounded-2xl border transition-all duration-500 ${
                    pos === 1 ? 'bg-gradient-to-r from-yellow-900/20 to-zinc-900 border-yellow-500/50 scale-105 shadow-[0_0_20px_rgba(234,179,8,0.1)]' : 'bg-zinc-900 border-zinc-800'
                }`;

                card.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="flex items-center justify-center w-10 h-10 rounded-full font-black ${
                            pos === 1 ? 'bg-yellow-500 text-black' : 'bg-zinc-800 text-zinc-400'
                        }">
                            ${pos}
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-white uppercase tracking-tight">${name}</h3>
                            <p class="text-xs text-zinc-500 font-medium italic">Variedad en cata</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-mono font-bold ${pos === 1 ? 'text-yellow-500' : 'text-zinc-300'}">
                            ${score}
                        </span>
                        <div class="w-24 h-1.5 bg-zinc-800 rounded-full mt-2 overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-orange-600 to-yellow-400" style="width: ${score * 10}%"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Refrescar cada 30 segundos
        setInterval(fetchRanking, 30000);
    </script>
</body>
</html>
