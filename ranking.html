<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking Kritical</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            background-color: #040405;
        }

        .bg-dinamico {
            position: relative;
            background: linear-gradient(135deg, #050508 0%, #0d0a0f 50%, #06080c 100%);
            background-size: 400% 400%;
            animation: gradienteSuave 20s ease infinite;
        }

        .bg-dinamico::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        @keyframes gradienteSuave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .ranking-hidden {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-adaptativo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            align-content: start;
            gap: 1rem;
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }

        @media (max-width: 480px) {
            .grid-adaptativo {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 0.6rem;
            }
        }
    </style>
</head>

<body class="text-zinc-100 font-sans bg-dinamico p-4 md:p-8 flex flex-col h-screen select-none">

    <div class="w-full max-w-[1800px] mx-auto flex flex-col h-full gap-5 md:gap-6 z-10 relative">

        <header class="text-center shrink-0 flex flex-col items-center">
            <div id="badge-modo" class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-zinc-900/80 border border-zinc-800 text-xs md:text-sm font-mono text-zinc-400 uppercase tracking-[0.2em] mb-2.5 shadow-md">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="badge-texto">Ranking General • En Vivo</span>
            </div>

            <h1 class="text-5xl md:text-7xl font-black uppercase italic tracking-tighter bg-gradient-to-r from-yellow-400 via-amber-400 to-amber-500 bg-clip-text text-transparent leading-none drop-shadow-[0_4px_12px_rgba(234,179,8,0.15)]">
                Ranking Kritical
            </h1>

            <div class="mt-2 text-sm md:text-xl font-bold uppercase tracking-[0.2em] text-zinc-400">
                Visita <span class="text-yellow-400 font-black">WWW.CATAKRITI.COM</span> y participa
            </div>
        </header>

        <div id="ultimo-voto-container" class="shrink-0 bg-zinc-950/60 border-2 border-zinc-900 rounded-2xl p-4 md:p-5 flex items-center justify-between text-center md:text-left gap-6 backdrop-blur-md shadow-2xl max-w-5xl mx-auto w-full animate-fade-in">
            <div class="flex items-center gap-4 min-w-0">
                <div class="hidden md:flex px-3 py-1.5 rounded-xl bg-yellow-500/10 border border-yellow-500/30 text-yellow-400 font-mono text-sm font-black uppercase tracking-widest shrink-0 animate-pulse">
                    NUEVO VOTO
                </div>
                <div class="min-w-0">
                    <p class="text-xs text-zinc-500 font-mono uppercase tracking-widest mb-0.5">Última Variedad Catada</p>
                    <p id="last-variedad" class="text-lg md:text-2xl font-black uppercase text-white truncate tracking-tight">Cargando...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6 md:gap-10 shrink-0 font-mono">
                <div class="text-center">
                    <p class="text-xs text-zinc-500 uppercase tracking-widest mb-1">Nota</p>
                    <p id="last-nota" class="text-xl md:text-3xl font-black text-amber-400 bg-amber-500/10 px-3 py-1 rounded-xl border border-amber-500/30 leading-none">--</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-zinc-500 uppercase tracking-widest mb-1">Fecha / Hora</p>
                    <p id="last-fecha" class="text-sm md:text-lg font-bold text-zinc-300 tracking-normal">--/--/-- --:--</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-4 md:gap-6 overflow-hidden min-h-0">
            <div id="top3-container" class="grid grid-cols-3 gap-3 md:gap-6 shrink-0 transition-all duration-300"></div>
            <div id="rest-wrapper" class="flex-1 flex flex-col min-h-0 bg-zinc-950/40 border border-zinc-900 rounded-2xl p-3 md:p-5 overflow-hidden transition-all duration-300">
                <div id="rest-container" class="grid-adaptativo"></div>
            </div>
        </div>

    </div>

    <script>
        const SHEET_ID = '18p9zl-VbQ7GcLUZdPD8EvB5xtRGJm6szt90hzO4MaPE';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        let cachedRanking = null;
        let modoGeneral = true;

        function normalizarTexto(texto) {
            if (!texto) return '';
            return texto.toLowerCase().replace(/\s+/g, ' ').trim();
        }

        // Calcula la distancia matemática Levenshtein entre dos textos
        function calcularSimilitud(s1, s2) {
            let l1 = s1.length;
            let l2 = s2.length;
            if (l1 === 0 || l2 === 0) return 0;

            let matrix = [];
            for (let i = 0; i <= l1; i++) matrix[i] = [i];
            for (let j = 0; j <= l2; j++) matrix[0][j] = j;

            for (let i = 1; i <= l1; i++) {
                for (let j = 1; j <= l2; j++) {
                    let cost = (s1[i - 1] === s2[j - 1]) ? 0 : 1;
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j] + 1,     
                        matrix[i][j - 1] + 1,     
                        matrix[i - 1][j - 1] + cost 
                    );
                }
            }
            let distancia = matrix[l1][l2];
            let longitudMaxima = Math.max(l1, l2);
            return (longitudMaxima - distancia) / longitudMaxima;
        }

        async function updateRanking() {
            try {
                const response = await fetch(URL);
                const csvText = await response.text();

                const rawRows = csvText.replace(/\r/g, "").split('\n');
                const validRows = rawRows.filter(row => row.trim() !== '');
                
                if (validRows.length > 1) {
                    let ultimaFilaRaw = validRows[validRows.length - 1];
                    let colsUltima = ultimaFilaRaw.split(';');
                    if (colsUltima.length <= 1) {
                        colsUltima = ultimaFilaRaw.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    }
                    
                    let fechaHora = colsUltima[0]?.replace(/"/g, '').trim() || '--';
                    let ultimaVariedad = colsUltima[2]?.replace(/"/g, '').trim() || 'Desconocida';
                    let ultimaNotaRaw = colsUltima[4]?.replace(/"/g, '').trim() || '0';
                    let ultimaNota = parseFloat(ultimaNotaRaw.replace(',', '.'));

                    document.getElementById('last-variedad').innerText = ultimaVariedad;
                    document.getElementById('last-nota').innerText = isNaN(ultimaNota) ? '--' : ultimaNota.toFixed(1);
                    document.getElementById('last-fecha').innerText = fechaHora;
                }

                // --- SISTEMA CORREGIDO DE UNIFICACIÓN ---
                const stats = {};
                // Mapeo dinámico para recordar qué variantes equivalen a la variedad original oficial
                const mapaDeVariedades = {}; 

                for (let i = 1; i < rawRows.length; i++) {
                    if (!rawRows[i].trim()) continue;
                    
                    let columnas = rawRows[i].split(';');
                    if (columnas.length <= 1) {
                        columnas = rawRows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    }

                    let variedadOriginal = columnas[2]?.replace(/"/g, '').trim();
                    let notaRaw = columnas[4]?.replace(/"/g, '').trim();
                    let nota = parseFloat(notaRaw?.replace(',', '.'));

                    if (variedadOriginal && !isNaN(nota)) {
                        let varianteNormalizada = normalizarTexto(variedadOriginal);
                        let claveOficial = varianteNormalizada; 

                        // Comparamos contra el listado acumulado para ver si hay un error tipográfico previo
                        let clavesExistentes = Object.keys(stats);
                        let encontrado = false;

                        for (let clave of clavesExistentes) {
                            if (clave === varianteNormalizada || calcularSimilitud(varianteNormalizada, clave) >= 0.82) {
                                claveOficial = clave;
                                encontrado = true;
                                break;
                            }
                        }

                        // Si no se parece a nada previo, inicializamos la variedad oficial con este primer registro
                        if (!encontrado) {
                            stats[claveOficial] = {
                                displayName: variedadOriginal, // Nombre estético definitivo tomado del primer registro
                                total: 0,
                                count: 0,
                                notas: []
                            };
                        }

                        // Acumulamos los datos sobre la clave oficial unificada
                        stats[claveOficial].total += nota;
                        stats[claveOficial].count += 1;
                        stats[claveOficial].notas.push(nota);
                    }
                }

                cachedRanking = Object.keys(stats)
                    .map(key => ({
                        name: stats[key].displayName,
                        avg: stats[key].total / stats[key].count,
                        votes: stats[key].count,
                        notas: stats[key].notas.sort((a, b) => b - a)
                    }))
                    .sort((a, b) => b.avg - a.avg);

                render();

            } catch (err) {
                console.error("Error cargando los datos del ranking:", err);
            }
        }

        function alternarVista() {
            if (!cachedRanking) return;

            const top3 = document.getElementById('top3-container');
            const restWrapper = document.getElementById('rest-wrapper');

            top3.classList.add('ranking-hidden');
            restWrapper.classList.add('ranking-hidden');

            setTimeout(() => {
                modoGeneral = !modoGeneral;
                render();
                
                top3.classList.remove('ranking-hidden');
                restWrapper.classList.remove('ranking-hidden');
            }, 300);
        }

        function render() {
            const top3 = document.getElementById('top3-container');
            const restContainer = document.getElementById('rest-container');
            const restWrapper = document.getElementById('rest-wrapper');
            const badgeTexto = document.getElementById('badge-texto');

            top3.innerHTML = '';
            restContainer.innerHTML = '';

            if (!cachedRanking || cachedRanking.length === 0) {
                restContainer.innerHTML = `
                    <div class="h-full w-full flex items-center justify-center col-span-full">
                        <span class="text-zinc-600 italic text-2xl animate-pulse">Esperando datos de catas...</span>
                    </div>
                `;
                return;
            }

            if (modoGeneral) {
                badgeTexto.innerText = "Ranking General • En Vivo";
                top3.className = "grid grid-cols-3 gap-4 md:gap-6 shrink-0";
                restWrapper.style.display = "flex";

                cachedRanking.forEach((item, index) => {
                    const pos = index + 1;

                    if (pos <= 3) {
                        let styles = {
                            1: { border: "border-amber-500/40", bg: "bg-gradient-to-b from-amber-500/15 to-zinc-900/20", text: "text-amber-400", badge: "bg-amber-500/20 text-amber-300 border-amber-500/30" },
                            2: { border: "border-zinc-400/30", bg: "bg-gradient-to-b from-zinc-400/10 to-zinc-900/20", text: "text-zinc-300", badge: "bg-zinc-400/20 text-zinc-300 border-zinc-400/30" },
                            3: { border: "border-orange-600/30", bg: "bg-gradient-to-b from-orange-600/10 to-zinc-900/20", text: "text-orange-400", badge: "bg-orange-600/20 text-orange-400 border-orange-600/30" }
                        }[pos];

                        const card = document.createElement('div');
                        card.className = `animate-fade-in ${styles.bg} border-2 ${styles.border} rounded-2xl p-5 flex flex-col justify-between relative overflow-hidden min-h-[140px] md:min-h-[180px]`;
                        
                        card.innerHTML = `
                            <div>
                                <span class="inline-block px-2 py-0.5 rounded text-xs md:text-sm font-mono font-bold border ${styles.badge}">TOP 0${pos}</span>
                                <h2 class="mt-2 text-lg md:text-3xl font-black uppercase tracking-tight text-white line-clamp-2 break-words leading-tight">${item.name}</h2>
                            </div>
                            <div class="mt-4 flex justify-between items-end">
                                <div class="text-xs md:text-sm text-zinc-400 font-mono">${item.votes} ${item.votes === 1 ? 'voto' : 'votos'}</div>
                                <div class="text-right">
                                    <div class="text-3xl md:text-5xl font-black font-mono leading-none ${styles.text}">${item.avg.toFixed(2)}</div>
                                    <div class="text-[9px] uppercase tracking-wider text-zinc-500 font-bold mt-1">Media</div>
                                </div>
                            </div>
                        `;
                        top3.appendChild(card);
                    } else {
                        const card = document.createElement('div');
                        card.className = `animate-fade-in bg-zinc-900/30 border-2 border-zinc-900/80 rounded-xl p-3.5 flex flex-col justify-between min-h-[85px] md:min-h-[100px]`;

                        card.innerHTML = `
                            <div class="flex items-start gap-2 min-w-0">
                                <span class="font-mono text-xs md:text-sm font-bold text-zinc-600 mt-0.5 shrink-0">#${pos}</span>
                                <div class="text-sm md:text-lg font-black uppercase text-zinc-200 line-clamp-2 break-words leading-tight w-full">${item.name}</div>
                            </div>
                            <div class="flex items-end justify-between mt-2 pt-2 border-t border-white/[0.03]">
                                <span class="text-xs text-zinc-500 font-medium leading-none">${item.votes} v.</span>
                                <span class="text-sm md:text-xl font-black font-mono text-zinc-300 bg-zinc-950/80 px-2 py-0.5 rounded-lg border border-zinc-900 leading-none">${item.avg.toFixed(2)}</span>
                            </div>
                        `;
                        restContainer.appendChild(card);
                    }
                });
            } else {
                badgeTexto.innerText = "Detalle de Votos • Top 5 de la Cata";
                top3.className = "grid grid-cols-1 md:grid-cols-5 gap-4 md:gap-6 h-full flex-1 min-h-0 w-full"; 
                restWrapper.style.display = "none";

                const top5Data = cachedRanking.slice(0, 5);

                top5Data.forEach((item, index) => {
                    const pos = index + 1;
                    
                    const votosHTML = item.notas.map((nota, i) => `
                        <div class="flex items-center justify-between text-sm font-mono py-2 px-2.5 rounded-xl bg-zinc-950/60 border border-zinc-900/80">
                            <span class="text-zinc-500 text-xs">Cata #${i + 1}</span>
                            <span class="font-black text-yellow-400 text-base">${nota.toFixed(1)}</span>
                        </div>
                    `).join('');

                    const card = document.createElement('div');
                    card.className = "animate-fade-in bg-zinc-900/10 border-2 border-zinc-900 rounded-2xl p-4 flex flex-col h-full min-h-0 overflow-hidden";
                    
                    card.innerHTML = `
                        <div class="shrink-0 pb-3 border-b-2 border-zinc-900 mb-3">
                            <div class="flex justify-between items-center">
                                <span class="px-2 py-0.5 rounded-lg text-xs font-mono font-bold bg-zinc-800 text-zinc-300">PUESTO 0${pos}</span>
                                <span class="text-base font-mono font-black text-amber-400 bg-amber-500/10 px-2.5 py-1 rounded-xl border border-amber-500/30">${item.avg.toFixed(2)}</span>
                            </div>
                            <h2 class="mt-3 text-base md:text-2xl font-black uppercase tracking-tight text-white line-clamp-2 break-words leading-tight">
                                ${item.name}
                            </h2>
                            <p class="text-xs text-zinc-500 font-mono mt-1">${item.votes} votos registrados</p>
                        </div>
                        <div class="flex-1 overflow-y-auto space-y-2 pr-1 text-zinc-400 scrollbar-thin">
                            ${votosHTML}
                        </div>
                    `;
                    top3.appendChild(card);
                });
            }
        }

        updateRanking();
        setInterval(updateRanking, 60000);
        setInterval(alternarVista, 30000);
    </script>

</body>
</html>
