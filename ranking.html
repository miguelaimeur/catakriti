<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Ranking Kritical</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-8 font-sans">

    <div class="max-w-4xl mx-auto">

        <header class="text-center mb-12">

            <h1 class="text-6xl md:text-7xl font-black uppercase italic tracking-tighter text-yellow-500">
                Ranking Kritical
            </h1>

            <div class="mt-5 text-lg md:text-xl font-black uppercase tracking-[0.15em] text-zinc-300">
                Visita 
                <span class="text-yellow-500">
                    WWW.CATAKRITI.COM
                </span>
                y participa
            </div>

            <div class="mt-4 text-sm font-mono text-zinc-500 uppercase tracking-[0.3em]">
                Resultados Consolidados • Tiempo Real
            </div>

        </header>

        <div id="ranking-container" class="space-y-5">
            <!-- Cargando datos -->
        </div>

    </div>

    <script>

        const SHEET_ID = '1b8rv0cUEfBeJkLPMSG4ew1CnCAA2DKCA53pp0syQJl4';

        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        async function updateRanking() {

            try {

                const response = await fetch(URL);

                const csvText = await response.text();

                // Procesar CSV
                const rows = csvText.split('\n').map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                const stats = {};

                // Saltar cabecera
                for (let i = 1; i < rows.length; i++) {

                    let variedad = rows[i][2]
                        ?.replace(/"/g, '')
                        .trim();

                    let nota = parseFloat(
                        rows[i][4]
                        ?.replace(/"/g, '')
                        .replace(',', '.')
                    );

                    if (variedad && !isNaN(nota)) {

                        if (!stats[variedad]) {

                            stats[variedad] = {
                                total: 0,
                                count: 0
                            };
                        }

                        stats[variedad].total += nota;
                        stats[variedad].count += 1;
                    }
                }

                const ranking = Object.keys(stats)
                    .map(name => ({
                        name,
                        avg: stats[name].total / stats[name].count,
                        votes: stats[name].count
                    }))
                    .sort((a, b) => b.avg - a.avg);

                render(ranking);

            } catch (err) {

                console.error("Error:", err);
            }
        }

        function render(data) {

            const container = document.getElementById('ranking-container');

            container.innerHTML = '';

            if (data.length === 0) {

                container.innerHTML = `
                    <p class="text-center text-zinc-600 italic py-10 text-2xl">
                        Esperando primeras puntuaciones...
                    </p>
                `;

                return;
            }

            data.forEach((item, index) => {

                const pos = index + 1;

                const card = document.createElement('div');

                // Colores podium
                let borderColor = "border-zinc-800";
                let textColor = "text-zinc-400";

                if (pos === 1) {
                    borderColor = "border-yellow-500";
                    textColor = "text-yellow-500";
                }

                if (pos === 2) {
                    borderColor = "border-zinc-400";
                    textColor = "text-zinc-200";
                }

                if (pos === 3) {
                    borderColor = "border-orange-700";
                    textColor = "text-orange-500";
                }

                card.className = `
                    flex items-center justify-between
                    p-6
                    bg-zinc-900/60
                    border-l-8 ${borderColor}
                    rounded-r-2xl
                    shadow-2xl
                `;

                card.innerHTML = `
                    <div class="flex items-center gap-6">

                        <span class="text-5xl font-black italic ${textColor}">
                            #${pos}
                        </span>

                        <div class="flex flex-col">

                            <span class="text-3xl md:text-4xl font-black uppercase tracking-tight">
                                ${item.name}
                            </span>

                            <span class="text-lg text-zinc-400 mt-1">
                                ${item.votes} voto${item.votes !== 1 ? 's' : ''}
                            </span>

                        </div>

                    </div>

                    <div class="flex flex-col items-end">

                        <span class="text-5xl md:text-6xl font-mono font-black ${textColor}">
                            ${item.avg.toFixed(2)}
                        </span>

                        <span class="text-sm uppercase text-zinc-500 font-bold tracking-[0.2em] mt-1">
                            Media Final
                        </span>

                    </div>
                `;

                container.appendChild(card);
            });
        }

        updateRanking();

        // Actualizar cada 10 segundos
        setInterval(updateRanking, 10000);

    </script>

</body>
</html>
