<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Cata PRO - Directo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-slate-200 min-h-screen p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 italic uppercase">
                Ranking Cata PRO
            </h1>
            <p id="status" class="mt-4 text-xs font-mono text-zinc-500 uppercase tracking-widest text-white">Sincronizando con Google Sheets...</p>
        </header>

        <div id="ranking-container" class="space-y-4">
            <!-- Los datos aparecerán aquí -->
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const SHEET_ID = '1b8rv0cUEfBeJkLPMSG4ew1CnCAA2DKCA53pp0syQJl4';
        // Exportamos como CSV para saltar bloqueos de la API de Google
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        async function fetchRanking() {
            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                
                // Convertir CSV a Array de Objetos
                const rows = csvText.split('\n').map(row => row.split(','));
                
                // Filtrar y procesar datos (Columna C: Variedad [índice 2], Columna E: Nota [índice 4])
                // Empezamos en i=1 para saltar la cabecera
                const stats = {};

                for (let i = 1; i < rows.length; i++) {
                    const variedad = rows[i][2]?.replace(/"/g, '').trim(); // Columna C
                    const nota = parseFloat(rows[i][4]); // Columna E

                    if (variedad && !isNaN(nota)) {
                        if (!stats[variedad]) {
                            stats[variedad] = { total: 0, count: 0 };
                        }
                        stats[variedad].total += nota;
                        stats[variedad].count += 1;
                    }
                }

                // Calcular promedios y ordenar
                const ranking = Object.keys(stats).map(name => ({
                    name,
                    avg: stats[name].total / stats[name].count
                })).sort((a, b) => b.avg - a.avg);

                renderUI(ranking);
                document.getElementById('status').innerText = "Actualizado: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Error de conexión";
            }
        }

        function renderUI(data) {
            const container = document.getElementById('ranking-container');
            container.innerHTML = '';

            data.forEach((item, index) => {
                const pos = index + 1;
                const card = document.createElement('div');
                card.className = `flex items-center justify-between p-5 rounded-2xl border transition-all ${
                    pos === 1 ? 'bg-zinc-900 border-yellow-500/50 scale-105 shadow-lg' : 'bg-zinc-900/40 border-zinc-800'
                }`;

                card.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="w-10 h-10 flex items-center justify-center rounded-full font-black ${pos === 1 ? 'bg-yellow-500 text-black' : 'bg-zinc-800 text-zinc-500'}">
                            ${pos}
                        </div>
                        <h3 class="text-xl font-bold uppercase italic">${item.name}</h3>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-mono font-black ${pos === 1 ? 'text-yellow-400' : 'text-zinc-400'}">
                            ${item.avg.toFixed(2)}
                        </span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        fetchRanking();
        setInterval(fetchRanking, 10000); // Cada 10 segundos
    </script>
</body>
</html>
