<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking Kritical</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html,
        body {
            overflow: hidden;
            height: 100%;
        }

        body {
            background: #000;
        }

        .top-card {
            min-height: 150px;
        }

        .mini-card {
            min-height: 68px;
        }
    </style>
</head>

<body class="text-white font-sans h-screen p-3">

    <div class="max-w-[1920px] mx-auto h-full flex flex-col">

        <!-- HEADER -->
        <header class="text-center mb-3 shrink-0">

            <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">
                Ranking Kritical
            </h1>

            <div class="mt-2 text-sm md:text-lg font-black uppercase tracking-[0.15em] text-zinc-300">
                Visita
                <span class="text-yellow-500">
                    WWW.CATAKRITI.COM
                </span>
                y participa
            </div>

            <div class="mt-1 text-[10px] md:text-xs font-mono text-zinc-500 uppercase tracking-[0.3em]">
                Resultados Consolidados • Tiempo Real
            </div>

        </header>

        <!-- CONTENIDO -->
        <div class="flex-1 flex flex-col gap-3 overflow-hidden">

            <!-- TOP 3 -->
            <div id="top3-container"
                class="grid grid-cols-3 gap-3 shrink-0">
            </div>

            <!-- TOP 4-20 -->
            <div id="rest-container"
                class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2 flex-1 overflow-hidden">
            </div>

        </div>

    </div>

    <script>

        const SHEET_ID = '1b8rv0cUEfBeJkLPMSG4ew1CnCAA2DKCA53pp0syQJl4';

        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        async function updateRanking() {

            try {

                const response = await fetch(URL);

                const csvText = await response.text();

                const rows = csvText.split('\n').map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                const stats = {};

                for (let i = 1; i < rows.length; i++) {

                    let variedad = rows[i][2]
                        ?.replace(/"/g, '')
                        .trim();

                    let nota = parseFloat(
                        rows[i][4]
                            ?.replace(/"/g, '')
                            .replace(',', '.')
                    );

                    if (variedad && !isNaN(nota)) {

                        if (!stats[variedad]) {

                            stats[variedad] = {
                                total: 0,
                                count: 0
                            };
                        }

                        stats[variedad].total += nota;
                        stats[variedad].count += 1;
                    }
                }

                const ranking = Object.keys(stats)
                    .map(name => ({
                        name,
                        avg: stats[name].total / stats[name].count,
                        votes: stats[name].count
                    }))
                    .sort((a, b) => b.avg - a.avg)
                    .slice(0, 20);

                render(ranking);

            } catch (err) {

                console.error("Error:", err);
            }
        }

        function render(data) {

            const top3 = document.getElementById('top3-container');
            const rest = document.getElementById('rest-container');

            top3.innerHTML = '';
            rest.innerHTML = '';

            if (data.length === 0) {

                rest.innerHTML = `
                    <div class="col-span-full flex items-center justify-center h-full">
                        <p class="text-zinc-600 italic text-2xl">
                            Esperando primeras puntuaciones...
                        </p>
                    </div>
                `;

                return;
            }

            data.forEach((item, index) => {

                const pos = index + 1;

                let borderColor = "border-zinc-800";
                let textColor = "text-zinc-400";
                let bgColor = "bg-zinc-900/70";

                if (pos === 1) {
                    borderColor = "border-yellow-500";
                    textColor = "text-yellow-400";
                    bgColor = "bg-yellow-500/10";
                }

                if (pos === 2) {
                    borderColor = "border-zinc-300";
                    textColor = "text-zinc-100";
                    bgColor = "bg-zinc-200/10";
                }

                if (pos === 3) {
                    borderColor = "border-orange-700";
                    textColor = "text-orange-500";
                    bgColor = "bg-orange-500/10";
                }

                // TOP 3
                if (pos <= 3) {

                    const card = document.createElement('div');

                    card.className = `
                        top-card
                        ${bgColor}
                        border-2 ${borderColor}
                        rounded-2xl
                        p-4
                        flex flex-col
                        justify-between
                        shadow-2xl
                    `;

                    card.innerHTML = `
                        <div class="flex justify-between items-start">

                            <div>

                                <div class="text-5xl font-black italic ${textColor}">
                                    #${pos}
                                </div>

                                <div class="mt-2 text-2xl md:text-3xl font-black uppercase leading-tight">
                                    ${item.name}
                                </div>

                            </div>

                            <div class="text-right">

                                <div class="text-5xl md:text-6xl font-black font-mono ${textColor}">
                                    ${item.avg.toFixed(2)}
                                </div>

                                <div class="text-xs uppercase tracking-[0.2em] text-zinc-500 mt-1">
                                    Media
                                </div>

                            </div>

                        </div>

                        <div class="mt-3 text-lg text-zinc-300 font-bold">
                            ${item.votes} voto${item.votes !== 1 ? 's' : ''}
                        </div>
                    `;

                    top3.appendChild(card);

                } else {

                    // RESTO HASTA 20

                    const card = document.createElement('div');

                    card.className = `
                        mini-card
                        ${bgColor}
                        border-l-4 ${borderColor}
                        rounded-xl
                        px-3
                        py-2
                        flex
                        items-center
                        justify-between
                    `;

                    card.innerHTML = `

                        <div class="flex items-center gap-3 min-w-0">

                            <div class="text-2xl font-black italic ${textColor}">
                                #${pos}
                            </div>

                            <div class="min-w-0">

                                <div class="text-sm md:text-base font-black uppercase truncate">
                                    ${item.name}
                                </div>

                                <div class="text-[11px] text-zinc-500">
                                    ${item.votes} voto${item.votes !== 1 ? 's' : ''}
                                </div>

                            </div>

                        </div>

                        <div class="text-2xl font-black font-mono ${textColor}">
                            ${item.avg.toFixed(2)}
                        </div>
                    `;

                    rest.appendChild(card);
                }
            });
        }

        updateRanking();

        // Actualiza cada 10 segundos
        setInterval(updateRanking, 10000);

    </script>

</body>
</html>
