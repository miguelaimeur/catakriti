<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking Kritical</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            background-color: #040405;
        }

        /* Fondo dinámico elegante: movimiento sutil de gradiente + líneas de cuadrícula */
        .bg-dinamico {
            position: relative;
            background: linear-gradient(135deg, #050508 0%, #0d0a0f 50%, #06080c 100%);
            background-size: 400% 400%;
            animation: gradienteSuave 20s ease infinite;
        }

        /* Líneas de cuadrícula fijas sobrepuestas para dar textura tecnológica */
        .bg-dinamico::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        @keyframes gradienteSuave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animación suave de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Estilo elástico adaptativo para rellenar el espacio sin hacer scroll */
        .grid-adaptativo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            align-content: stretch;
            gap: 0.5rem;
            width: 100%;
            height: 100%;
        }

        /* Ajuste de columnas en móviles pequeños */
        @media (max-width: 480px) {
            .grid-adaptativo {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 0.35rem;
            }
        }
    </style>
</head>

<body class="text-zinc-100 font-sans bg-dinamico p-3 md:p-5 flex flex-col h-screen select-none">

    <div class="w-full max-w-[1920px] mx-auto flex flex-col h-full gap-3 md:gap-4 z-10 relative">

        <header class="text-center shrink-0 flex flex-col items-center">
            
            <div class="inline-flex items-center gap-2 px-3 py-0.5 rounded-full bg-zinc-900/60 border border-zinc-800/80 text-[9px] md:text-xs font-mono text-zinc-400 uppercase tracking-[0.15em] mb-1.5 shadow-inner">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                Resultados Consolidados • En Vivo
            </div>

            <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter bg-gradient-to-r from-yellow-400 via-amber-400 to-amber-500 bg-clip-text text-transparent leading-none drop-shadow-[0_2px_8px_rgba(234,179,8,0.1)]">
                Ranking Kritical
            </h1>

            <div class="mt-1.5 text-xs md:text-base font-bold uppercase tracking-[0.15em] text-zinc-400">
                Visita <span class="text-yellow-400 font-black">WWW.CATAKRITI.COM</span> y participa
            </div>

        </header>

        <div class="flex-1 flex flex-col gap-3 md:gap-4 overflow-hidden min-h-0">

            <div id="top3-container" class="grid grid-cols-3 gap-2 md:gap-4 shrink-0">
                </div>

            <div class="flex-1 flex flex-col min-h-0 bg-zinc-950/20 border border-zinc-900/60 rounded-xl p-2 md:p-3 overflow-hidden">
                <div id="rest-container" class="grid-adaptativo">
                    </div>
            </div>

        </div>

    </div>

    <script>
        const SHEET_ID = '1b8rv0cUEfBeJkLPMSG4ew1CnCAA2DKCA53pp0syQJl4';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        async function updateRanking() {
            try {
                const response = await fetch(URL);
                const csvText = await response.text();

                const rows = csvText.replace(/\r/g, "").split('\n').map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                const stats = {};

                for (let i = 1; i < rows.length; i++) {
                    let variedad = rows[i][2]?.replace(/"/g, '').trim();
                    let nota = parseFloat(rows[i][4]?.replace(/"/g, '').replace(',', '.'));

                    if (variedad && !isNaN(nota)) {
                        if (!stats[variedad]) {
                            stats[variedad] = { total: 0, count: 0 };
                        }
                        stats[variedad].total += nota;
                        stats[variedad].count += 1;
                    }
                }

                const ranking = Object.keys(stats)
                    .map(name => ({
                        name,
                        avg: stats[name].total / stats[name].count,
                        votes: stats[name].count
                    }))
                    .sort((a, b) => b.avg - a.avg);

                render(ranking);

            } catch (err) {
                console.error("Error cargando los datos:", err);
            }
        }

        function render(data) {
            const top3 = document.getElementById('top3-container');
            const rest = document.getElementById('rest-container');

            top3.innerHTML = '';
            rest.innerHTML = '';

            if (data.length === 0) {
                rest.innerHTML = `
                    <div class="h-full w-full flex items-center justify-center col-span-full">
                        <span class="text-zinc-600 italic text-lg animate-pulse">Esperando datos...</span>
                    </div>
                `;
                return;
            }

            const totalResto = data.length - 3;

            data.forEach((item, index) => {
                const pos = index + 1;

                if (pos <= 3) {
                    let styles = {
                        1: {
                            border: "border-amber-500/30",
                            bg: "bg-gradient-to-b from-amber-500/10 to-zinc-900/10",
                            text: "text-amber-400",
                            badge: "bg-amber-500/20 text-amber-300 border-amber-500/20"
                        },
                        2: {
                            border: "border-zinc-400/20",
                            bg: "bg-gradient-to-b from-zinc-400/5 to-zinc-900/10",
                            text: "text-zinc-300",
                            badge: "bg-zinc-400/10 text-zinc-300 border-zinc-400/20"
                        },
                        3: {
                            border: "border-orange-600/20",
                            bg: "bg-gradient-to-b from-orange-600/5 to-zinc-900/10",
                            text: "text-orange-400",
                            badge: "bg-orange-600/10 text-orange-400 border-orange-600/20"
                        }
                    }[pos];

                    const card = document.createElement('div');
                    card.className = `animate-fade-in ${styles.bg} border ${styles.border} rounded-xl p-3 flex flex-col justify-between relative overflow-hidden`;
                    
                    card.innerHTML = `
                        <div>
                            <span class="inline-block px-1.5 py-0.5 rounded text-[9px] md:text-xs font-mono font-bold border ${styles.badge}">
                                TOP 0${pos}
                            </span>
                            <h2 class="mt-1.5 text-sm md:text-xl font-black uppercase tracking-tight text-white line-clamp-2 break-words">
                                ${item.name}
                            </h2>
                        </div>
                        
                        <div class="mt-3 flex justify-between items-end">
                            <div class="text-[9px] md:text-xs text-zinc-500 font-mono">
                                ${item.votes} ${item.votes === 1 ? 'voto' : 'votos'}
                            </div>
                            <div class="text-right">
                                <div class="text-xl md:text-4xl font-black font-mono leading-none ${styles.text}">
                                    ${item.avg.toFixed(2)}
                                </div>
                                <div class="text-[8px] uppercase tracking-wider text-zinc-500 font-bold mt-1">
                                    Media
                                </div>
                            </div>
                        </div>
                    `;
                    top3.appendChild(card);

                } else {
                    // FILAS COMPACTAS (POSICIÓN 4 EN ADELANTE)
                    const textSize = totalResto > 15 ? 'text-[11px] md:text-xs' : 'text-xs md:text-sm';
                    const paddingSize = totalResto > 15 ? 'p-2' : 'p-2.5';

                    const card = document.createElement('div');
                    card.className = `animate-fade-in bg-zinc-900/20 border border-zinc-900/80 rounded-lg ${paddingSize} flex flex-col justify-between h-full min-h-[55px] md:min-h-[65px]`;

                    card.innerHTML = `
                        <div class="flex items-start gap-1.5 min-w-0">
                            <span class="font-mono text-[9px] md:text-[11px] font-bold text-zinc-600 mt-0.5 shrink-0">
                                #${pos}
                            </span>
                            <div class="${textSize} font-bold uppercase text-zinc-200 line-clamp-2 break-words leading-tight w-full">
                                ${item.name}
                            </div>
                        </div>
                        
                        <div class="flex items-end justify-between mt-1 pt-1 border-t border-white/[0.02]">
                            <span class="text-[9px] text-zinc-600 font-medium leading-none">
                                ${item.votes} v.
                            </span>
                            <span class="text-xs md:text-base font-black font-mono text-zinc-400 bg-zinc-950/60 px-1.5 py-0.5 rounded border border-zinc-900/50 leading-none">
                                ${item.avg.toFixed(2)}
                            </span>
                        </div>
                    `;
                    rest.appendChild(card);
                }
            });
        }

        updateRanking();
        setInterval(updateRanking, 10000);
    </script>

</body>
</html>
